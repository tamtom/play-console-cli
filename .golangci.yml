run:
  timeout: 5m
  tests: true

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - misspell
    - unparam
    - errorlint

linters-settings:
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (io.ReadCloser).Close
      - (*os.File).Close
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
      - os.Setenv
      - os.Unsetenv
      - (*text/tabwriter.Writer).Flush
  misspell:
    locale: US
