name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  format-and-lint:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: go install mvdan.cc/gofumpt@latest
      - name: Check formatting
        run: make format && git diff --exit-code || (echo "Run 'make format' to fix." && exit 1)
      - name: Check docs
        run: make check-docs
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: go test -v -race ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [format-and-lint, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
      - run: make build
      - run: ./gplay version
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: gplay-${{ runner.os }}-${{ runner.arch }}
          path: gplay*
          retention-days: 1
          if-no-files-found: ignore
